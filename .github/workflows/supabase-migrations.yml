name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Push database migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_ID: aiwrzjeyapcjulyhdqbb
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Check required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
